services:
  api:
    build: ./api
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/docusync
      - UPLOAD_DIR=/volumes/pdfs
    volumes:
      - pdfs:/volumes/pdfs
      - ./api/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=docusync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d docusync"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pdfs:
  pgdata: